<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lyric & Chord Scroller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="controls">
      <div class="row">
        <div class="file-section">
          <label for="fileInput">Load:</label>
          <input type="file" id="fileInput" accept=".txt,.text">
        </div>
        <button id="playPauseBtn" title="Play/Pause">&#9658;</button>
        <button id="stopBtn" title="Stop">&#9632;</button>
        <button id="editBtn">Edit</button>
        <button id="doneBtn" class="hidden">Done</button>
        <button id="detectChordsBtn" title="Detect chord rows and add &gt;">Detect Chords</button>
        <button id="saveBtn" title="Download as .txt file">Save</button>
      </div>
    </header>

    <main class="content">
      <div id="displayArea" class="display-area">
        <div id="lyricsDisplay"></div>
      </div>
      <div id="editArea" class="edit-area hidden">
        <div id="lyricsEditor" contenteditable="true" data-placeholder="Paste or type lyrics and chords here. Chord rows start with &gt; Inline chords: &lt;C&gt; &lt;Am&gt; etc."></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
