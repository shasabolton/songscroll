<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyric & Chord Scroller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="controls">
      <div class="file-section">
        <label for="fileInput">Load file:</label>
        <input type="file" id="fileInput" accept=".txt,.text">
      </div>
      <div class="settings">
        <label>
          Initial delay (s):
          <input type="number" id="initialDelay" value="2" min="0" step="0.5">
        </label>
        <label>
          Scroll speed (px/s):
          <input type="number" id="scrollSpeed" value="30" min="1" step="1">
        </label>
        <label>
          Transpose:
          <input type="number" id="transpose" value="0" min="-11" max="11" step="1">
        </label>
      </div>
      <div class="playback">
        <button id="playBtn" disabled>Play</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="restartBtn" disabled>Restart</button>
        <button id="editBtn" disabled>Edit</button>
        <button id="doneBtn" disabled class="hidden">Done</button>
        <button id="saveBtn" disabled>Save</button>
      </div>
    </header>

    <main class="content">
      <div id="displayArea" class="display-area">
        <div id="lyricsDisplay"></div>
      </div>
      <div id="editArea" class="edit-area hidden">
        <textarea id="lyricsEditor" placeholder="Paste or type lyrics and chords here...&#10;&#10;Chord rows start with &gt;&#10;Inline chords: &lt;C&gt; &lt;Am&gt; etc."></textarea>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
